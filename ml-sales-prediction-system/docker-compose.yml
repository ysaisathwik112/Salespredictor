version: "3.9"

services:
  # ── Flask API ──
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: salescast-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=${SECRET_KEY:-salescast-secret-key}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///instance/sales_prediction.db}
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=INFO
    volumes:
      - ./logs:/app/logs
      - ./instance:/app/instance
      - model_data:/app/ml/artifacts
    depends_on:
      - redis
    networks:
      - salescast-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Redis Cache ──
  redis:
    image: redis:7-alpine
    container_name: salescast-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - salescast-net
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:1.25-alpine
    container_name: salescast-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - salescast-net

volumes:
  redis_data:
  model_data:

networks:
  salescast-net:
    driver: bridge
